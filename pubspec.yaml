name: edugram
description: Edugram with Firebase backend

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  image_picker: ^1.0.0
  provider: ^6.0.2
  uuid: ^4.0.0
  shared_preferences: ^2.2.0
  intl: ^0.18.0
  flutter_staggered_grid_view: ^0.7.0
  video_player: ^2.8.1
  path_provider: ^2.1.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  photo_manager: ^3.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/ic_instagram.svg
    - assets/fonts/GrandHotel-Regular.ttf
    - assets/profile_pic.png
    - assets/sounds/mixkit-correct-answer-tone-2870.wav
    - assets/sounds/mixkit-long-pop-2358.wav
    - assets/sounds/mixkit-bubble-pop-up-alert-notification-2357.wav

  fonts:
    - family: GrandHotel
      fonts:
        - asset: assets/fonts/GrandHotel-Regular.ttf

